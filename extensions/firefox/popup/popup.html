<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LinkHive</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="configError" class="view">
  <h1>LinkHive</h1>
  <p class="tagline">Never lose a link again</p>
  <p class="status error" id="configMsg">Config not found.</p>
  <p style="font-size:11px;color:#656d76">Create <code>extensions/shared/config.js</code> with your GitHub credentials.</p>
</div>

<div id="addView" class="view hidden">
  <div class="header-bar">
    <h1>Add to LinkHive</h1>
  </div>
  <div class="field">
    <label>URL</label>
    <input type="url" id="linkUrl" placeholder="https://...">
  </div>
  <div class="field">
    <label>Title</label>
    <input type="text" id="linkTitle" placeholder="Page title">
  </div>
  <div class="field">
    <label>Description</label>
    <textarea id="linkDesc" placeholder="Description" rows="2"></textarea>
  </div>
  <div class="field">
    <label>Collection</label>
    <select id="linkCollection"></select>
  </div>
  <div class="field">
    <label>Tags</label>
    <input type="text" id="linkTags" placeholder="tag1, tag2">
  </div>
  <button id="linkSave">Save Link</button>
  <p class="status" id="linkStatus"></p>
</div>

<script src="../shared/config.js"></script>
<script src="../shared/data-model.js"></script>
<script src="../shared/github.js"></script>
<script src="popup.js"></script>
</body>
</html>
