<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LinkHive</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="setupView" class="view">
  <h1>LinkHive</h1>
  <p class="tagline">Never lose a link again</p>
  <div class="field">
    <label>GitHub Token</label>
    <input type="password" id="setupToken" placeholder="github_pat_...">
  </div>
  <div class="field">
    <label>Repository</label>
    <input type="text" id="setupRepo" placeholder="owner/repo-name">
  </div>
  <div class="field">
    <label>Branch</label>
    <input type="text" id="setupBranch" placeholder="main" value="main">
  </div>
  <button id="setupSave">Save &amp; Connect</button>
  <p class="status" id="setupStatus"></p>
</div>

<div id="addView" class="view hidden">
  <div class="header-bar">
    <h1>Add to LinkHive</h1>
    <button id="btnSettings" class="btn-icon" title="Settings">&#9881;</button>
  </div>
  <div class="field">
    <label>URL</label>
    <input type="url" id="linkUrl" placeholder="https://...">
  </div>
  <div class="field">
    <label>Title</label>
    <input type="text" id="linkTitle" placeholder="Page title">
  </div>
  <div class="field">
    <label>Description</label>
    <textarea id="linkDesc" placeholder="Description" rows="2"></textarea>
  </div>
  <div class="field">
    <label>Collection</label>
    <select id="linkCollection"></select>
    <p id="collHint" class="hint hidden">Sync collections from the LinkHive app first</p>
  </div>
  <div class="field">
    <label>Tags</label>
    <input type="text" id="linkTags" placeholder="tag1, tag2">
  </div>
  <button id="linkSave">Save Link</button>
  <p class="status" id="linkStatus"></p>
</div>

<script src="../shared/data-model.js"></script>
<script src="../shared/github.js"></script>
<script src="popup.js"></script>
</body>
</html>
